name: CI
on:
  push:
    branches:
      - main
      - 'temp-*'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
permissions: {}
jobs:
  check-latest-versions:
    permissions:
      contents: read
    runs-on: 'ubuntu-24.04'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      # - name: Check latest versions
      #   run: ./check-latest-versions.sh && git diff --quiet
  build:
    permissions:
      contents: write
    name: build-${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    needs: check-latest-versions
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: 'ubuntu-24.04'
            platform: 'linux-x64'
          - os: 'ubuntu-24.04'
            platform: 'linux-armv6'
          - os: 'ubuntu-24.04'
            platform: 'linuxmusl-x64'
          - os: 'ubuntu-24.04'
            platform: 'linux-ppc64le'
          - os: 'ubuntu-24.04'
            platform: 'linux-riscv64'
          - os: 'ubuntu-24.04'
            platform: 'linux-s390x'
          - os: 'ubuntu-24.04'
            platform: 'dev-wasm32'
          - os: 'ubuntu-24.04'
            platform: 'win32-ia32'
          - os: 'ubuntu-24.04'
            platform: 'win32-x64'
          - os: 'ubuntu-24.04'
            platform: 'win32-arm64v8'
          - os: 'macos-15-intel'
            platform: 'darwin-x64'
          - os: 'macos-15'
            platform: 'darwin-arm64v8'
          - os: 'ubuntu-24.04-arm'
            platform: 'linux-arm64v8'
          - os: 'ubuntu-24.04-arm'
            platform: 'linuxmusl-arm64v8'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          pipx install meson
          brew install automake nasm
      - name: Build ${{ matrix.platform }}
        run: ./build.sh ${{ matrix.platform }}
      - name: Generate integrity checksums
        id: integrity
        run: ./integrity.sh
      - name: Upload Release Asset (.tar.gz)
        id: upload-release-asset-gz
        if: startsWith(github.ref, 'refs/tags/v')
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: sharp-libvips-${{ matrix.platform }}.tar.gz
          artifactContentType: application/gzip
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          prerelease: true
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Release Asset (.integrity)
        id: upload-release-asset-integrity
        if: startsWith(github.ref, 'refs/tags/v')
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: "*.integrity"
          artifactContentType: text/plain
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          prerelease: true
          token: ${{ secrets.GITHUB_TOKEN }}
